name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      DOTNET_MULTILEVEL_LOOKUP: 0
      MAUI_VERSION: 8.0.100
    steps:
      - uses: actions/checkout@v4

      - name: Pin SDK resolver to .NET 8
        shell: pwsh
        run: |
          @'
          {
            "sdk": {
              "version": "8.0.100",
              "rollForward": "disable"
            }
          }
          '@ | Set-Content -Path global.json -NoNewline

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.100'

      - name: Show .NET SDK info
        shell: pwsh
        run: |
          $sdk = dotnet --version
          Write-Host "Selected SDK: $sdk"
          dotnet --list-sdks
          if (-not $sdk.StartsWith('8.')) {
            throw "Expected .NET SDK 8.x, got $sdk"
          }

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Decode keystore
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\App\meloninstaller.keystore", $bytes)

      - name: Build Android APK
        run: >
          dotnet publish App/MelonLoader.Installer.App.csproj
          -f net8.0-android
          -c Release
          /p:MauiVersion=${{ env.MAUI_VERSION }}
          /p:AndroidSigningKeyStore=meloninstaller.keystore
          /p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }}
          /p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }}
          /p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LemonLoader-Installer
          path: App/bin/Release/net8.0-android/publish/*.apk